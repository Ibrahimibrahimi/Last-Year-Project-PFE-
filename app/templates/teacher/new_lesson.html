{% extends "layout.html" %}
{% block title %}New Lesson — LearnCode{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-7">
      <div class="lc-card">
        <div class="lc-card-header">
          <i class="bi bi-journal-plus me-2"></i>New Lesson — {{ lang.name }}
        </div>
        <div class="lc-card-body">
          <form method="POST" action="{{ url_for('teacher.new_lesson', lang_id=lang.id) }}">
            <div class="mb-3">
              <label class="form-label fw-semibold">Lesson Title</label>
              <input type="text" name="title" class="form-control lc-input"
                     placeholder="e.g. Variables & Data Types" required />
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Content / Explanation</label>
              <textarea name="content" class="form-control lc-input" rows="5"
                        placeholder="Explain the concept in simple terms..." required></textarea>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Code Example</label>
              <textarea name="code_example" class="form-control lc-input font-mono" rows="6"
                        placeholder="# Write a code example here"></textarea>
            </div>
            <div class="mb-4">
              <label class="form-label fw-semibold">XP Reward</label>
              <input type="number" name="xp" class="form-control lc-input"
                     value="10" min="1" max="100" />
            </div>
            <div class="d-flex gap-3">
              <button type="submit" class="btn lc-btn-primary">
                <i class="bi bi-check2-circle me-2"></i>Create Lesson
              </button>
              <a href="{{ url_for('teacher.dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Courses — CodeLearn</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/navbar.css">
  <style>
    .page-hero {
      padding: 100px 0 50px;
      background: #fff;
      border-bottom: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }
    .page-hero::before {
      content:'';
      position:absolute; inset:0;
      background: radial-gradient(ellipse 80% 60% at 50% 100%, rgba(14,165,233,.12) 0%, transparent 60%);
    }
    .page-hero h1 { font-size:clamp(28px,4vw,44px); font-weight:900; letter-spacing:-2px; margin-bottom:8px; }

    /* Filters sidebar */
    .catalog-layout  { display:grid; grid-template-columns:260px 1fr; gap:28px; padding:40px 0; }
    .filter-panel    { position:sticky; top:84px; align-self:start; }
    .filter-card     { background:#fff; border:1px solid var(--border); border-radius:var(--r2); padding:20px; margin-bottom:14px; }
    .filter-title    { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--text-2); margin-bottom:14px; }

    .filter-check {
      display:flex; align-items:center; gap:10px;
      padding:7px 0; cursor:pointer; font-size:13px; color:var(--text-2); transition:var(--ease);
    }
    .filter-check:hover { color:var(--text); }
    .filter-check input { accent-color:var(--cyan); width:14px; height:14px; cursor:pointer; }
    .filter-count       { margin-left:auto; font-size:11px; color:var(--text-3); }

    /* Search & sort bar */
    .catalog-bar {
      display:flex; align-items:center; gap:12px;
      margin-bottom:20px; flex-wrap:wrap;
    }

    .catalog-search {
      display:flex; align-items:center; gap:8px;
      background:#fff; border:1px solid var(--border);
      border-radius:var(--r2); padding:10px 16px; flex:1; min-width:200px;
    }
    .catalog-search:focus-within { border-color:rgba(14,165,233,.4); }
    .catalog-search input { background:none; border:none; outline:none; color:var(--text); font-size:14px; font-family:var(--font-body); width:100%; }
    .catalog-search input::placeholder { color:var(--text-3); }

    .sort-select {
      background:#fff; border:1px solid var(--border); border-radius:var(--r2);
      padding:10px 16px; color:var(--text); font-size:13px; font-family:var(--font-body);
      outline:none; cursor:pointer; transition:var(--ease);
    }
    .sort-select:focus { border-color:var(--cyan); }

    /* Active filters */
    .active-filters { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px; }
    .filter-tag {
      display:flex; align-items:center; gap:6px;
      padding:4px 10px; background:var(--cyan-dim); color:var(--cyan);
      border:1px solid rgba(14,165,233,.2); border-radius:20px; font-size:12px; font-weight:600;
      cursor:pointer; transition:var(--ease);
    }
    .filter-tag:hover { background:rgba(14,165,233,.2); }

    /* Course cards */
    .course-card {
      background:#fff; border:1px solid var(--border); border-radius:var(--r3);
      overflow:hidden; transition:var(--ease); height:100%; display:flex; flex-direction:column;
    }
    .course-card:hover { transform:translateY(-5px); border-color:var(--border-h); box-shadow:var(--shadow-lg); }

    .course-banner {
      height:100px; display:grid; place-items:center; font-size:40px;
      position:relative; overflow:hidden;
    }
    .course-banner::after { content:''; position:absolute; inset:0; background:rgba(0,0,0,.25); }
    .course-banner span   { position:relative; z-index:1; }

    .course-body { padding:18px; flex:1; display:flex; flex-direction:column; }
    .course-foot { padding:12px 18px; border-top:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }

    .course-title { font-size:15px; font-weight:700; margin-bottom:5px; }
    .course-sub   { font-size:12px; color:var(--text-2); line-height:1.5; margin-bottom:10px; flex:1; }

    .course-meta  { display:flex; flex-wrap:wrap; gap:10px; font-size:11px; color:var(--text-2); }
    .course-meta span { display:flex; align-items:center; gap:4px; }

    .course-price        { font-size:17px; font-weight:800; color:var(--cyan); }
    .course-price.free   { color:var(--green); }
    .course-rating       { display:flex; align-items:center; gap:4px; color:var(--amber); font-weight:600; font-size:12px; }

    /* Language nav pills */
    .lang-nav { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:24px; }
    .lang-pill {
      display:flex; align-items:center; gap:6px;
      padding:7px 14px; background:#fff; border:1px solid var(--border);
      border-radius:20px; font-size:13px; font-weight:500; color:var(--text-2);
      cursor:pointer; transition:var(--ease); white-space:nowrap;
    }
    .lang-pill:hover { background:#f8fafc; color:var(--text); }
    .lang-pill.active { background:var(--cyan-dim); border-color:rgba(14,165,233,.3); color:var(--cyan); }

    /* Empty state */
    .empty-state { text-align:center; padding:60px 20px; }
    .empty-state i { font-size:48px; color:var(--text-3); margin-bottom:16px; }

    /* Results count */
    .results-count { font-size:13px; color:var(--text-2); margin-bottom:6px; }
  </style>
</head>
<body>

<nav class="cl-nav">
  <div class="container-fluid px-4">
    <a href="../../index.html" class="nav-brand">
      <div class="nav-brand-icon">&lt;/&gt;</div>
      <span class="nav-brand-text">Code<span>Learn</span></span>
    </a>
    <div class="nav-links">
      <a href="../../index.html"       class="nav-link-item"><i class="fas fa-house"></i> Home</a>
      <a href="catalog.html"           class="nav-link-item active"><i class="fas fa-code"></i> Courses</a>
      <a href="../../index.html#instructors" class="nav-link-item"><i class="fas fa-users"></i> Instructors</a>
    </div>
    <div class="nav-right">
      <a href="../auth/login.html"  class="btn-secondary" style="padding:7px 18px;font-size:13px;">Log In</a>
      <a href="../auth/signup.html" class="btn-primary"   style="padding:7px 18px;font-size:13px;"><i class="fas fa-rocket"></i> Get Started</a>
    </div>
  </div>
</nav>

<!-- Hero -->
<div class="page-hero page-offset">
  <div class="container position-relative">
    <div class="cl-badge badge-cyan mb-3"><i class="fas fa-code"></i> All Courses</div>
    <h1>Master Any Language.<br>Build Real Projects.</h1>
    <p style="font-size:16px;color:var(--text-2);max-width:500px;margin-top:10px;">
      <span id="totalCount" data-count="120">0</span> courses across
      <span id="langCount"  data-count="10">0</span>  programming languages.
      From beginner to expert.
    </p>
  </div>
</div>

<div class="container">
  <div class="catalog-layout">

    <!-- ── FILTERS ── -->
    <aside class="filter-panel">
      <div class="filter-card">
        <div class="filter-title">Level</div>
        <label class="filter-check"><input type="checkbox" value="Beginner"     onchange="applyFilters()"> Beginner     <span class="filter-count">18</span></label>
        <label class="filter-check"><input type="checkbox" value="Intermediate" onchange="applyFilters()"> Intermediate <span class="filter-count">34</span></label>
        <label class="filter-check"><input type="checkbox" value="Advanced"     onchange="applyFilters()"> Advanced     <span class="filter-count">28</span></label>
      </div>

      <div class="filter-card">
        <div class="filter-title">Price</div>
        <label class="filter-check"><input type="checkbox" value="free"   onchange="applyFilters()"> Free             <span class="filter-count">22</span></label>
        <label class="filter-check"><input type="checkbox" value="paid"   onchange="applyFilters()"> Paid             <span class="filter-count">98</span></label>
      </div>

      <div class="filter-card">
        <div class="filter-title">Duration</div>
        <label class="filter-check"><input type="checkbox" value="short">  Under 6 weeks  <span class="filter-count">15</span></label>
        <label class="filter-check"><input type="checkbox" value="medium"> 6–12 weeks     <span class="filter-count">62</span></label>
        <label class="filter-check"><input type="checkbox" value="long">   Over 12 weeks  <span class="filter-count">43</span></label>
      </div>

      <div class="filter-card">
        <div class="filter-title">Rating</div>
        <label class="filter-check"><input type="checkbox"> ⭐ 4.5 & above <span class="filter-count">78</span></label>
        <label class="filter-check"><input type="checkbox"> ⭐ 4.0 & above <span class="filter-count">105</span></label>
      </div>

      <button class="btn-ghost w-100" onclick="clearFilters()" style="margin-top:4px;color:var(--rose);justify-content:center;">
        <i class="fas fa-times"></i> Clear All Filters
      </button>
    </aside>

    <!-- ── MAIN CONTENT ── -->
    <div>
      <!-- Language nav -->
      <div class="lang-nav" id="langNav"></div>

      <!-- Search + Sort bar -->
      <div class="catalog-bar">
        <div class="catalog-search">
          <i class="fas fa-search" style="color:var(--text-3);font-size:13px;"></i>
          <input type="text" id="searchInput" placeholder="Search courses, languages, topics…" oninput="applyFilters()">
        </div>
        <select class="sort-select" id="sortSelect" onchange="applyFilters()">
          <option value="popular">Most Popular</option>
          <option value="rating">Top Rated</option>
          <option value="newest">Newest First</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
        </select>
      </div>

      <!-- Active filters row -->
      <div class="active-filters" id="activeFilters"></div>

      <!-- Results count -->
      <div class="results-count" id="resultsCount"></div>

      <!-- Grid -->
      <div class="row g-4" id="courseGrid"></div>
    </div>
  </div>
</div>

<!-- Footer minimal -->
<footer style="background:#f8fafc;border-top:1px solid var(--border);padding:28px 0;margin-top:60px;">
  <div class="container d-flex justify-content-between align-items-center flex-wrap gap-3">
    <span style="font-size:13px;color:var(--text-3);">© 2026 CodeLearn</span>
    <div style="display:flex;gap:20px;">
      <a href="#" style="font-size:13px;color:var(--text-3);text-decoration:none;">Privacy</a>
      <a href="#" style="font-size:13px;color:var(--text-3);text-decoration:none;">Terms</a>
    </div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../assets/js/data.js"></script>
<script src="../../assets/js/app.js"></script>
<script>
  let activeLang    = 'all';
  let activeFilters = [];

  /* ── Language nav ── */
  const langNav = document.getElementById('langNav');
  const allPill = document.createElement('div');
  allPill.className = 'lang-pill active';
  allPill.textContent = 'All Languages';
  allPill.dataset.lang = 'all';
  allPill.addEventListener('click', () => setLang('all', allPill));
  langNav.appendChild(allPill);

  LANGUAGES.forEach(l => {
    const pill = document.createElement('div');
    pill.className = 'lang-pill';
    pill.innerHTML = `${l.icon} ${l.name}`;
    pill.dataset.lang = l.id;
    pill.addEventListener('click', () => setLang(l.id, pill));
    langNav.appendChild(pill);
  });

  function setLang(id, el) {
    activeLang = id;
    document.querySelectorAll('.lang-pill').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    applyFilters();
  }

  /* ── Render courses ── */
  function renderCourses(list) {
    const grid = document.getElementById('courseGrid');
    document.getElementById('resultsCount').textContent = `${list.length} course${list.length !== 1 ? 's' : ''} found`;

    if (!list.length) {
      grid.innerHTML = `
        <div class="col-12 empty-state">
          <i class="fas fa-search d-block"></i>
          <h5 style="font-weight:700;margin-bottom:8px;">No courses found</h5>
          <p style="color:var(--text-2);font-size:14px;">Try adjusting your filters or search term.</p>
          <button class="btn-secondary mt-3" onclick="clearFilters()">Clear Filters</button>
        </div>`;
      return;
    }

    grid.innerHTML = '';
    list.forEach((c, i) => {
      grid.innerHTML += `
        <div class="col-md-6 col-lg-4 anim-fade-up" style="animation-delay:${i * .05}s">
          <div class="course-card">
            <div class="course-banner" style="background:${c.gradient};">
              <span>${c.langIcon}</span>
            </div>
            <div class="course-body">
              <div class="d-flex flex-wrap gap-1 mb-2">
                ${c.badge ? `<span class="cl-badge ${c.badgeClass}">${c.badge}</span>` : ''}
                <span class="cl-badge badge-violet" style="font-size:10px;">${c.level}</span>
              </div>
              <div class="course-title">${c.title}</div>
              <div class="course-sub">${c.subtitle}</div>
              <div class="course-meta">
                <span><i class="fas fa-clock"></i> ${c.duration}</span>
                <span><i class="fas fa-book-open"></i> ${c.lessons} lessons</span>
                <span><i class="fas fa-folder"></i> ${c.projects} projects</span>
                <span><i class="fas fa-users"></i> ${(c.students/1000).toFixed(1)}k</span>
              </div>
              <div class="d-flex align-items-center gap-8 mt-2">
                <div class="course-rating"><i class="fas fa-star"></i> ${c.rating} (${c.reviews})</div>
              </div>
            </div>
            <div class="course-foot">
              <div class="course-price ${c.price===0?'free':''}">${c.price===0?'Free':'$'+c.price}</div>
              <a href="course-detail.html?id=${c.id}" class="btn-primary" style="padding:7px 16px;font-size:13px;">
                <i class="fas fa-play-circle"></i> Enroll
              </a>
            </div>
          </div>
        </div>`;
    });
  }

  /* ── Apply filters ── */
  function applyFilters() {
    const query  = document.getElementById('searchInput').value.toLowerCase();
    const sort   = document.getElementById('sortSelect').value;
    const levels = [...document.querySelectorAll('input[value="Beginner"]:checked, input[value="Intermediate"]:checked, input[value="Advanced"]:checked')].map(i => i.value);
    const prices = [...document.querySelectorAll('input[value="free"]:checked, input[value="paid"]:checked')].map(i => i.value);

    let list = [...COURSES];

    if (activeLang !== 'all') {
      list = list.filter(c => c.language.toLowerCase().replace(/[^a-z]/g,'').includes(activeLang.replace(/#/g,'csharp').toLowerCase()));
    }

    if (query) {
      list = list.filter(c =>
        c.title.toLowerCase().includes(query) ||
        c.language.toLowerCase().includes(query) ||
        c.tags.some(t => t.toLowerCase().includes(query))
      );
    }

    if (levels.length) list = list.filter(c => levels.includes(c.level));
    if (prices.length) {
      list = list.filter(c =>
        (prices.includes('free') && c.price === 0) ||
        (prices.includes('paid') && c.price > 0)
      );
    }

    if (sort === 'rating')      list.sort((a,b) => b.rating - a.rating);
    else if (sort === 'price-asc')  list.sort((a,b) => a.price - b.price);
    else if (sort === 'price-desc') list.sort((a,b) => b.price - a.price);
    else list.sort((a,b) => b.students - a.students);

    renderCourses(list);
  }

  function clearFilters() {
    document.querySelectorAll('input[type=checkbox]').forEach(c => c.checked = false);
    document.getElementById('searchInput').value = '';
    activeLang = 'all';
    document.querySelectorAll('.lang-pill').forEach(p => p.classList.remove('active'));
    document.querySelector('[data-lang="all"]').classList.add('active');
    applyFilters();
  }

  /* Init */
  applyFilters();
</script>
</body>
</html>

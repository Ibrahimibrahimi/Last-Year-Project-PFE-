<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/student.css') }}">
</head>
<body>
<div class="card">
  <div class="badge">Student Portal</div>
  <h1>Welcome back</h1>
  <p class="sub">Sign in to access your courses &amp; progress.</p>

  {% if error %}
  <div class="error-box">⚠ {{ error }}</div>
  {% endif %}

  <form method="POST" action="{{ url_for('auth.login') }}">
    <div class="field">
      <label>Student Email</label>
      <input type="text" name="identifier" placeholder="etudiant@example.com" required>
      <span class="error">{{email}}</span>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" name="password" placeholder="••••••••" required>
      <span class="error">{{password}}</span>
    </div>
    <button class="btn" type="submit">Sign In →</button>
  </form>

  <div class="divider">or</div>

  <div class="footer">
    New student? <a href="{{ url_for('auth.register') }}">Create an account</a>
    &nbsp;·&nbsp;
  </div>
</div>
</body>
</html>
